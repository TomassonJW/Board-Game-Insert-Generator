<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BGIG — Atelier de rangement</title><style>
:root{color-scheme:light;font-family:Arial,sans-serif;color:#1f2933;background:#f6f4ef}*{box-sizing:border-box}body{margin:0;padding:18px;background:#f6f4ef}.eyebrow{color:#9a5b36;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{margin:6px 0;font-size:22px;line-height:1.15}.intro{margin:0 0 16px;color:#5d6770;font-size:13px;line-height:1.45}.card{margin:10px 0;padding:13px;border:1px solid #e2ded5;border-radius:14px;background:#fffdfa;box-shadow:0 1px 2px rgba(31,41,51,.04)}.label{color:#66727c;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}.value{margin-top:5px;font-size:15px;font-weight:700}.detail{margin-top:4px;color:#5d6770;font-size:12px;line-height:1.4}.actions{display:grid;gap:8px;margin:16px 0 10px}button{min-height:40px;border:0;border-radius:10px;padding:0 12px;background:#233b53;color:#fff;cursor:pointer;font:inherit;font-size:13px;font-weight:700}button.secondary{background:#e7e2d9;color:#27343f}button.tertiary{background:transparent;border:1px solid #cfc9be;color:#43515b}.notice,.warnings{display:none;margin:12px 0;padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.45}.notice{background:#e8f1ee;color:#275a49}.warnings{background:#fff2dc;color:#805527}.warnings ul{margin:0;padding-left:18px}details{margin-top:14px;color:#5d6770;font-size:12px}summary{cursor:pointer}pre{white-space:pre-wrap;word-break:break-word;color:#6a4c38}
</style></head><body>
<div class="eyebrow">BGIG dans Fusion</div><h1>Atelier de rangement</h1><p class="intro">Ici, tu prepares ton projet, construis l insert et controles la scene sans quitter Fusion.</p>
<section class="card"><div class="label">Design</div><div class="value" id="source-status">Chargement…</div><div class="detail" id="source-detail"></div></section><section class="card"><div class="label">Scene Fusion</div><div class="value" id="scene-status">Chargement…</div><div class="detail" id="scene-detail"></div></section><section class="card"><div class="label">Fabrication</div><div class="value" id="manufacturing-status">Chargement…</div><div class="detail" id="manufacturing-detail"></div></section>
<div class="warnings" id="warnings"><ul id="warnings-list"></ul></div><div class="notice" id="notice"></div><div class="actions"><button type="button" onclick="send('preview')">Previsualiser</button><button type="button" class="secondary" onclick="send('update')">Mettre a jour la scene</button><button type="button" class="secondary" onclick="send('export')">Exporter les bacs</button><button type="button" class="tertiary" onclick="send('expert')">Reglages experts</button></div><details><summary>Detail technique (si besoin)</summary><pre id="technical-detail">Aucun detail technique.</pre></details>
<script>function send(action){adsk.fusionSendData(action,'{}')}function text(id,value){document.getElementById(id).textContent=value||''}function showNotice(value){const el=document.getElementById('notice');el.textContent=value||'';el.style.display=value?'block':'none'}function renderState(payload){text('source-status',payload.source_status);text('source-detail',payload.source_detail);text('scene-status',payload.scene_status);text('scene-detail',payload.scene_detail);text('manufacturing-status',payload.manufacturing_status);text('manufacturing-detail',payload.manufacturing_detail);text('technical-detail',payload.technical_detail||'Aucun detail technique.');showNotice(payload.notice);const warnings=payload.warnings||[];const container=document.getElementById('warnings');const list=document.getElementById('warnings-list');list.innerHTML='';warnings.forEach((warning)=>{const item=document.createElement('li');item.textContent=warning;list.appendChild(item)});container.style.display=warnings.length?'block':'none'}window.fusionJavaScriptHandler={handle:function(action,data){try{const payload=JSON.parse(data||'{}');if(action==='bgig_palette_state')renderState(payload);else if(action==='bgig_palette_notice')showNotice(payload.notice);return'OK'}catch(error){console.log(error);return'ERROR'}}};send('refresh')</script>
</body></html>
